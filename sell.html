<!DOCTYPE html>
<html>
<head>
    <title>Sell a Book</title>
    <link rel="stylesheet" href="stylesheet.css">

    <style>
        .course-search-container {
            position: relative;
            width: 100%;
        }

        #courseSearch {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
        }

        .dropdown-list {
            position: absolute;
            top: 45px;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 999;
            display: none;
        }

        .dropdown-item {
            padding: 10px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<div class="sell-container">
    <h2>Sell a Textbook</h2>

    <form id="listingForm" class="sell-form">

        <!-- 🔍 SEARCHABLE COURSE SELECT -->
        <div class="course-search-container">
            <input type="text" id="courseSearch" placeholder="Search course (e.g. CS210)" autocomplete="off">
            <div id="dropdown" class="dropdown-list"></div>
        </div>

        <!-- hidden actual value -->
        <input type="hidden" id="course_code" required>

        <input type="text" id="title" placeholder="Book Title" required>
        <input type="text" id="edition" placeholder="Edition (ex: 5th Edition)">
        <input type="number" id="price" placeholder="Price" step="0.01" required>

        <select id="book_condition" required>
            <option value="">Select Condition</option>
            <option value="New">New</option>
            <option value="Like New">Like New</option>
            <option value="Good">Good</option>
            <option value="Used">Used</option>
        </select>

        <label>How useful was this book?</label>
        <div class="star-rating">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
        </div>

        <input type="hidden" id="rating">

        <textarea id="description" placeholder="Optional description..."></textarea>

        <label>Upload Book Image (optional)</label>
        <input type="file" id="image" accept="image/*">

        <button type="submit">Create Listing</button>
    </form>
</div>

<script>
// ⭐ STAR RATING
const stars = document.querySelectorAll(".star-rating span");
const ratingInput = document.getElementById("rating");

stars.forEach(star => {
    star.addEventListener("click", () => {
        const value = star.getAttribute("data-value");
        ratingInput.value = value;
        stars.forEach(s => s.classList.remove("active"));
        for (let i = 0; i < value; i++) stars[i].classList.add("active");
    });
});

// 📚 COURSE LIST
const courses = [
    "CS105","CS107","CS109","CS110","CS114L","CS119","CS187SL","CS188SL","CS210","CS220","CS240",
    "CS271L","CS285L","CS310","CS341","CS410","CS413","CS415","CS420","CS430","CS435","CS436",
    "CS437","CS438","CS442","CS443","CS444","CS446","CS449","CS450","CS451","CS460","CS461",
    "CS470","CS478","CS480","CS495","CS498",
    
    "IT110","IT111L","IT114L","IT116","IT117","IT187SL",
    "IT188SL","IT220","IT221","IT230L","IT240","IT244","IT246","IT285L","IT341","IT360","IT370",
    "IT420","IT421","IT425L","IT428L","IT442","IT443","IT444","IT456","IT460","IT461L","IT471",
    "IT472","IT478","IT480","IT485", 
    
    "AF210","AF211","AF301","AF310","AF311","AF315","AF317","AF325","AF330","AF335","AF363",
    "AF405","AF426","AF427","AF435","AF443","AF444","AF445","AF450","AF451","AF455","AF470",
    "AF475","AF478","AF480","AF488","AF490","AF495","AF498","AF499",

    "BIOCHM383","BIOCHM384","BIOCHM385","BIOCHM386",
    "BIOCHM471","BIOCHM472","BIOCHM491","BIOCHM492",

    "BIOL101","BIOL102","BIOL108","BIOL111","BIOL112","BIOL187S","BIOL188S",
    "BIOL207","BIOL208","BIOL209","BIOL210","BIOL212","BIOL252","BIOL254","BIOL290",
    "BIOL304","BIOL306","BIOL307","BIOL308","BIOL309","BIOL310","BIOL311","BIOL312",
    "BIOL313","BIOL314","BIOL315","BIOL316","BIOL318","BIOL319","BIOL321","BIOL323",
    "BIOL328","BIOL329","BIOL330","BIOL332","BIOL333","BIOL334","BIOL335","BIOL336L",
    "BIOL337","BIOL338","BIOL339","BIOL340","BIOL342","BIOL343","BIOL344","BIOL345",
    "BIOL347","BIOL348","BIOL352","BIOL353","BIOL354","BIOL355","BIOL356","BIOL357",
    "BIOL358","BIOL360","BIOL361","BIOL362","BIOL363","BIOL364","BIOL365","BIOL366",
    "BIOL370","BIOL372","BIOL376","BIOL377","BIOL378","BIOL380","BIOL381","BIOL382",
    "BIOL390","BIOL395","BIOL444","BIOL478","BIOL479"
];

const searchInput = document.getElementById("courseSearch");
const dropdown = document.getElementById("dropdown");
const hiddenInput = document.getElementById("course_code");

// 🔍 FILTER FUNCTION
searchInput.addEventListener("input", () => {
    const value = searchInput.value.toUpperCase();
    dropdown.innerHTML = "";

    if (!value) {
        dropdown.style.display = "none";
        return;
    }

    const filtered = courses.filter(c => c.includes(value));

    filtered.forEach(course => {
        const div = document.createElement("div");
        div.className = "dropdown-item";
        div.textContent = course;

        div.onclick = () => {
            searchInput.value = course;
            hiddenInput.value = course;
            dropdown.style.display = "none";
        };

        dropdown.appendChild(div);
    });

    dropdown.style.display = filtered.length ? "block" : "none";
});

// ❌ CLOSE DROPDOWN WHEN CLICKING OUTSIDE
document.addEventListener("click", (e) => {
    if (!e.target.closest(".course-search-container")) {
        dropdown.style.display = "none";
    }
});

// 🚀 SUBMIT FORM
document.getElementById("listingForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const seller_email = localStorage.getItem("userEmail");
    const seller_id = localStorage.getItem("userId");

    if (!seller_email || !seller_id) {
        alert("You must be logged in.");
        return;
    }

    if (!hiddenInput.value) {
        alert("Please select a course.");
        return;
    }

    const formData = new FormData();
    formData.append("course_code", hiddenInput.value);
    formData.append("title", document.getElementById("title").value);
    formData.append("edition", document.getElementById("edition").value);
    formData.append("price", document.getElementById("price").value);
    formData.append("book_condition", document.getElementById("book_condition").value);
    formData.append("rating", document.getElementById("rating").value);
    formData.append("description", document.getElementById("description").value);
    formData.append("seller_email", seller_email);
    formData.append("seller_id", seller_id);

    const file = document.getElementById("image").files[0];
    if (file) formData.append("image", file);

    const res = await fetch("/createListing", {
        method: "POST",
        body: formData
    });

    const result = await res.json();

    if (result.success) {
        alert("Listing created!");
        window.location.href = `listings.html?course=${hiddenInput.value}`;
    } else {
        alert("Error creating listing");
    }
});
</script>

</body>
</html>
