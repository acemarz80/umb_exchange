<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="stylesheet.css">
<title>My Profile</title>

<style>
.profile-container {
    padding: 20px;
}

.listing-card {
    border: 1px solid #ccc;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.profile-btn {
    padding: 8px 12px;
    margin-top: 8px;
    margin-right: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.delete-btn {
    background-color: #990000;
    color: white;
}

.sold-btn {
    background-color: green;
    color: white;
}
</style>
</head>

<body>

<nav class="topbar">
    <div class="logo">
        <img src="umb-logo.png">
    </div>

    <div class="nav-links">
        <a href="mainpage.html">Home</a>
        <a href="sell.html">Sell</a>
        <a href="messages.html">Messages</a>
    </div>
</nav>

<div class="profile-container">
    <h2>My Listings</h2>
    <div id="myListings"></div>
</div>

<script>
async function loadMyListings() {
    const userId = localStorage.getItem("userId");

    const res = await fetch(`/myListings?user_id=${userId}`);
    const data = await res.json();

    const container = document.getElementById("myListings");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = "<p>No listings yet.</p>";
        return;
    }

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "listing-card";

        div.innerHTML = `
            <h4>${item.title}</h4>
            <p>$${item.price}</p>
            <p>${item.course_code}</p>

            <button class="profile-btn delete-btn"
                onclick="deleteListing(${item.id})">
                Delete
            </button>

            <button class="profile-btn sold-btn"
                onclick="markSold(${item.id})">
                Mark as Sold
            </button>
        `;

        container.appendChild(div);
    });
}


// 🗑️ DELETE (with confirmation)
async function deleteListing(id) {
    const confirmDelete = confirm("Are you sure you want to delete this listing?");

    if (!confirmDelete) return;

    const seller_email = localStorage.getItem("userEmail");

    await fetch("/deleteListing", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, seller_email })
    });

    loadMyListings();
}


// ✅ MARK AS SOLD (also deletes)
async function markSold(id) {
    const confirmSold = confirm("Mark this item as sold?");

    if (!confirmSold) return;

    const seller_email = localStorage.getItem("userEmail");

    await fetch("/deleteListing", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, seller_email })
    });

    loadMyListings();
}


// load on page start
loadMyListings();
</script>

</body>
</html>
