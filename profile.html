<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="stylesheet.css">
<title>My Profile</title>

<style>
.profile-container {
    padding: 20px;
}

.profile-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
}

.profile-header img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ccc;
}

.profile-info h3 {
    margin: 0;
}

.profile-info p {
    margin: 3px 0 0 0;
    color: gray;
    font-size: 14px;
}

.edit-btn {
    margin-left: auto;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #003366;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

.logout-btn {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #990000;
    color: white;
    cursor: pointer;
    font-weight: bold;
    margin-left: 10px;
}

.listing-card {
    border: 1px solid #ccc;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.profile-btn {
    padding: 8px 12px;
    margin-top: 8px;
    margin-right: 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.delete-btn {
    background-color: #990000;
    color: white;
}

.sold-btn {
    background-color: green;
    color: white;
}
</style>
</head>

<body>

<nav class="topbar">
    <div class="logo">
        <img src="umb-logo.png">
    </div>

    <div class="nav-links">
        <a href="mainpage.html">Home</a>
        <a href="sell.html">Sell</a>
        <a href="messages.html">Messages</a>
        <a href="profile.html">Profile</a>
    </div>
</nav>

<div class="profile-container">

    <!-- PROFILE HEADER -->
    <div class="profile-header">
        <img id="profileAvatar"
             src="https://res.cloudinary.com/dx7tpzg3r/image/upload/v1777170742/avatar1_yszcku.png">

        <div class="profile-info">
            <h3 id="profileUsername">Loading...</h3>
            <p id="profileEmail"></p>
        </div>

        <button class="edit-btn" onclick="goToEditProfile()">
            Edit Profile
        </button>

        <!-- ✅ LOGOUT BUTTON -->
        <button class="logout-btn" onclick="logout()">
            Sign Out
        </button>
    </div>

    <h2>My Listings</h2>
    <div id="myListings"></div>
</div>

<script>

// =======================
// SAFETY CHECK
// =======================
const userId = Number(localStorage.getItem("userId"));

if (!userId) {
    window.location.href = "login.html";
}

// =======================
// LOAD PROFILE INFO
// =======================
function loadProfileInfo() {

    const username = localStorage.getItem("username");
    const email = localStorage.getItem("userEmail");
    const avatar = localStorage.getItem("avatar");

    document.getElementById("profileUsername").innerText =
        username || email;

    document.getElementById("profileEmail").innerText =
        email || "";

    document.getElementById("profileAvatar").src =
        avatar || "https://res.cloudinary.com/dx7tpzg3r/image/upload/v1777170742/avatar1_yszcku.png";
}

// =======================
// EDIT PROFILE
// =======================
function goToEditProfile() {
    window.location.href = "profile-edit.html";
}

// =======================
// LOGOUT FUNCTION
// =======================
function logout() {
    const confirmLogout = confirm("Are you sure you want to sign out?");
    if (!confirmLogout) return;

    localStorage.removeItem("userId");
    localStorage.removeItem("username");
    localStorage.removeItem("userEmail");
    localStorage.removeItem("avatar");

    window.location.href = "index.html";
}

// =======================
// LOAD LISTINGS
// =======================
async function loadMyListings() {

    const res = await fetch(`/myListings?user_id=${userId}`);
    const data = await res.json();

    const container = document.getElementById("myListings");
    container.innerHTML = "";

    if (!data || data.length === 0) {
        container.innerHTML = "<p>No listings yet.</p>";
        return;
    }

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "listing-card";

        div.innerHTML = `
            <h4>${item.title}</h4>
            <p>$${item.price}</p>
            <p>${item.course_code}</p>

            <button class="profile-btn delete-btn"
                onclick="deleteListing(${item.id})">
                Delete
            </button>

            <button class="profile-btn sold-btn"
                onclick="markSold(${item.id})">
                Mark as Sold
            </button>
        `;

        container.appendChild(div);
    });
}

// =======================
// DELETE
// =======================
async function deleteListing(id) {

    const confirmDelete = confirm("Are you sure you want to delete this listing?");
    if (!confirmDelete) return;

    const seller_email = localStorage.getItem("userEmail");

    await fetch("/deleteListing", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, seller_email })
    });

    loadMyListings();
}

// =======================
// MARK SOLD
// =======================
async function markSold(id) {

    const confirmSold = confirm("Mark this item as sold?");
    if (!confirmSold) return;

    const seller_email = localStorage.getItem("userEmail");

    await fetch("/deleteListing", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, seller_email })
    });

    loadMyListings();
}

// =======================
// INIT
// =======================
loadProfileInfo();
loadMyListings();

</script>

</body>
</html>
