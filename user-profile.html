<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Profile</title>
<link rel="stylesheet" href="stylesheet.css">

<style>
.profile-box {
    padding: 20px;
}

.header {
    display: flex;
    align-items: center;
    gap: 15px;
}

.header img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
}

.listing {
    border: 1px solid #ccc;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="profile-box">

    <div class="header">
        <img id="avatar" src="avatars/default-avatar.png">
        <div>
            <h2 id="username">Loading...</h2>
            <p id="email"></p>
        </div>
    </div>

    <h3>Listings</h3>
    <div id="listings"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const userId = params.get("user_id");

// redirect safety
if (!userId) {
    window.location.href = "mainpage.html";
}

// =======================
// LOAD USER INFO
// =======================
async function loadUser() {

    const res = await fetch(`/getUserById?id=${userId}`);
    const data = await res.json();

    document.getElementById("username").innerText =
        data.username || data.email;

    document.getElementById("email").innerText =
        data.email;

    document.getElementById("avatar").src =
        data.avatar ? `avatars/${data.avatar}` : "avatars/default-avatar.png";
}

// =======================
// LOAD LISTINGS
// =======================
async function loadListings() {

    const res = await fetch(`/getListingsByUser?user_id=${userId}`);
    const data = await res.json();

    const container = document.getElementById("listings");

    if (data.length === 0) {
        container.innerHTML = "<p>No listings.</p>";
        return;
    }

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "listing";

        div.innerHTML = `
            <h4>${item.title}</h4>
            <p>$${item.price}</p>
            <p>${item.course_code}</p>
        `;

        container.appendChild(div);
    });
}

loadUser();
loadListings();

</script>

</body>
</html>
