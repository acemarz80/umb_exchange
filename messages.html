<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UMB Exchange Messages</title>
    <link rel="stylesheet" href="messages.css">
</head>
<body>

<nav class="messages-nav">
    <div class="messages-logo">
        <img src="umb-logo.png" alt="UMB Exchange Logo">
    </div>

    <div class="messages-nav-links">
        <a href="./mainpage.html">Home</a>
        <a href="./browse.html">Browse</a>
        <a href="./sell.html">Sell a Book</a>
        <a href="./messages.html" class="active-link">Messages</a>
    </div>
</nav>

<main class="messages-page">

    <!-- LEFT SIDEBAR -->
    <aside class="conversation-sidebar">
        <h3>Your Conversations</h3>
        <div id="conversation-list">
            <p>No conversations yet.</p>
        </div>
    </aside>

    <!-- RIGHT CHAT AREA -->
    <section class="chat-section">

        <!-- HEADER -->
        <div class="chat-header">
            <p id="chat-label" class="chat-empty-title">Select a conversation</p>
            <p id="chat-context">Choose a student to start messaging</p>
        </div>

        <!-- CHAT BODY -->
        <div class="chat-container">

            <!-- EMPTY STATE -->
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">💬</div>
                <h2>No conversation selected</h2>
                <p>Select a conversation from the left to view messages and start chatting.</p>
            </div>

            <!-- MESSAGES -->
            <div id="messages-box" style="display:none;"></div>

            <!-- INPUT -->
            <div class="input-container" id="input-container" style="display:none;">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button id="send-button" onclick="sendMessage()">Send</button>
            </div>

        </div>

    </section>

</main>

<script src="/socket.io/socket.io.js"></script>
<script src="messages.js"></script>

</body>
</html>
